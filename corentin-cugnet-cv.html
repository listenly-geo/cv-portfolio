```html
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corentin CUGNET - Créateur de contenus audiovisuels</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #F4C542;
            --black: #000000;
            --white: #FFFFFF;
            --gray: #E5E5E5;
            --gray-dark: #1A1A1A;
            --gray-medium: #666666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--white);
            color: var(--black);
            overflow-x: hidden;
            line-height: 1.7;
        }

        h1, h2, h3, h4 {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Progress bar */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 5px;
            background: var(--yellow);
            z-index: 10000;
            transition: width 0.1s ease;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--white);
            z-index: 9999;
            padding: 1.2rem 2rem;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
        }

        nav ul {
            display: flex;
            gap: 2rem;
            list-style: none;
            justify-content: center;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--black);
            font-weight: 600;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a.active {
            background: var(--yellow);
            color: var(--black);
        }

        nav a:hover {
            background: var(--yellow);
            transform: translateY(-2px);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            position: fixed;
            top: 1.5rem;
            right: 2rem;
            z-index: 10001;
            background: var(--yellow);
            padding: 0.8rem;
            border-radius: 8px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: var(--black);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }

        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 55% 45%;
            align-items: center;
            gap: 4rem;
            padding: 8rem 4rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            z-index: 2;
        }

        .hero-badge {
            display: inline-block;
            background: var(--yellow);
            color: var(--black);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -2px;
        }

        .hero h1 .firstname {
            color: var(--yellow);
            -webkit-text-stroke: 2px var(--black);
            text-stroke: 2px var(--black);
            paint-order: stroke fill;
        }

        .hero .tagline {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            color: var(--gray-medium);
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .hero-stats {
            display: flex;
            gap: 3rem;
            margin: 2rem 0;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .stat-number {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 900;
            color: var(--yellow);
            line-height: 1;
            font-family: 'Space Grotesk', sans-serif;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--gray-medium);
            margin-top: 0.5rem;
        }

        .hero-cta {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
        }

        .btn {
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
            min-width: 48px;
            min-height: 48px;
            justify-content: center;
        }

        .btn-primary {
            background: var(--yellow);
            color: var(--black);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(244, 197, 66, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--black);
            border: 2px solid var(--black);
        }

        .btn-secondary:hover {
            background: var(--black);
            color: var(--white);
            transform: translateY(-3px);
        }

        /* Camera Effect WOW */
        .hero-visual {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .camera-container {
            position: relative;
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .camera-body {
            width: 280px;
            height: 200px;
            background: var(--black);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .camera-lens {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #333 0%, #111 100%);
            border: 8px solid var(--gray-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .lens-inner {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #555, #000);
            position: relative;
            overflow: hidden;
        }

        .lens-reflection {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            filter: blur(5px);
        }

        .shutter-blade {
            position: absolute;
            width: 100%;
            height: 100%;
            clip-path: polygon(50% 50%, 50% 0%, 100% 0%);
            background: var(--yellow);
            transform-origin: center;
            animation: shutterRotate 3s ease-in-out infinite;
        }

        .shutter-blade:nth-child(2) {
            animation-delay: 0.15s;
            transform: rotate(60deg);
        }

        .shutter-blade:nth-child(3) {
            animation-delay: 0.3s;
            transform: rotate(120deg);
        }

        .shutter-blade:nth-child(4) {
            animation-delay: 0.45s;
            transform: rotate(180deg);
        }

        .shutter-blade:nth-child(5) {
            animation-delay: 0.6s;
            transform: rotate(240deg);
        }

        .shutter-blade:nth-child(6) {
            animation-delay: 0.75s;
            transform: rotate(300deg);
        }

        @keyframes shutterRotate {
            0%, 100% {
                clip-path: polygon(50% 50%, 50% 0%, 100% 0%);
            }
            50% {
                clip-path: polygon(50% 50%, 50% 50%, 50% 50%);
            }
        }

        .camera-grip {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 60px;
            height: 25px;
            background: repeating-linear-gradient(
                90deg,
                var(--gray-dark),
                var(--gray-dark) 3px,
                #333 3px,
                #333 6px
            );
            border-radius: 4px;
        }

        .camera-button {
            position: absolute;
            top: 15px;
            left: 20px;
            width: 20px;
            height: 20px;
            background: var(--yellow);
            border-radius: 50%;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
            animation: recordBlink 2s ease-in-out infinite;
        }

        @keyframes recordBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .camera-viewfinder {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 15px;
            background: #111;
            border-radius: 3px;
        }

        .floating-icons {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .float-icon {
            position: absolute;
            font-size: 2rem;
            animation: floatAround 8s ease-in-out infinite;
            opacity: 0.15;
        }

        .float-icon:nth-child(1) {
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .float-icon:nth-child(2) {
            top: 70%;
            left: 80%;
            animation-delay: 1s;
        }

        .float-icon:nth-child(3) {
            top: 40%;
            left: 5%;
            animation-delay: 2s;
        }

        .float-icon:nth-child(4) {
            top: 80%;
            left: 20%;
            animation-delay: 3s;
        }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(10px, -20px) rotate(5deg); }
            50% { transform: translate(-15px, -10px) rotate(-5deg); }
            75% { transform: translate(5px, 15px) rotate(3deg); }
        }

        /* Section */
        section {
            max-width: 1240px;
            margin: 0 auto;
            padding: 6rem 2rem;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s ease;
        }

        section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 900;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 6px;
            background: var(--yellow);
            border-radius: 3px;
        }

        .section-subtitle {
            font-size: 1.1rem;
            color: var(--gray-medium);
            margin-top: 1.5rem;
        }

        /* Experiences */
        .experience-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .experience-card {
            background: var(--white);
            border: 3px solid var(--black);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .experience-card:hover {
            transform: translateX(8px);
            box-shadow: -8px 8px 0 var(--yellow);
        }

        .experience-header {
            padding: 2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
            background: var(--gray);
            transition: all 0.3s ease;
        }

        .experience-header:hover {
            background: var(--yellow);
        }

        .experience-info h3 {
            font-size: clamp(1.3rem, 2.5vw, 1.8rem);
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .experience-meta {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 0.8rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            color: var(--gray-medium);
        }

        .experience-type {
            background: var(--black);
            color: var(--white);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toggle-icon {
            font-size: 1.5rem;
            font-weight: 900;
            transition: transform 0.3s ease;
            background: var(--black);
            color: var(--yellow);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .experience-card.active .toggle-icon {
            transform: rotate(45deg);
        }

        .experience-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
        }

        .experience-card.active .experience-content {
            max-height: 800px;
        }

        .experience-missions {
            padding: 2rem;
            background: var(--white);
        }

        .experience-missions h4 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            font-weight: 800;
        }

        .missions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .mission-item {
            background: var(--gray);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: all 0.3s ease;
        }

        .mission-item:hover {
            background: var(--yellow);
            transform: translateX(5px);
        }

        .mission-item::before {
            content: '▸';
            font-weight: 900;
            color: var(--black);
        }

        /* Formations */
        .timeline {
            position: relative;
            padding-left: 3rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--gray);
        }

        .timeline-item {
            position: relative;
            padding-bottom: 3rem;
            opacity: 0;
            transform: translateX(-30px);
            transition: all 0.6s ease;
        }

        .timeline-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .timeline-item:nth-child(2) {
            transition-delay: 0.2s;
        }

        .timeline-dot {
            position: absolute;
            left: -3rem;
            top: 0;
            width: 20px;
            height: 20px;
            background: var(--yellow);
            border: 4px solid var(--black);
            border-radius: 50%;
            z-index: 2;
        }

        .timeline-content {
            background: var(--gray);
            padding: 2rem;
            border-radius: 12px;
            border-left: 5px solid var(--yellow);
            transition: all 0.3s ease;
        }

        .timeline-content:hover {
            transform: translateX(10px);
            box-shadow: -10px 10px 0 rgba(244, 197, 66, 0.3);
        }

        .timeline-content h3 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .timeline-content .school {
            font-size: 1.1rem;
            color: var(--gray-medium);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .timeline-content .year {
            display: inline-block;
            background: var(--black);
            color: var(--yellow);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 0.8rem;
        }

        .timeline-content .mention {
            display: inline-block;
            background: var(--yellow);
            color: var(--black);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-top: 0.8rem;
            margin-left: 0.5rem;
        }

        /* Compétences */
        .competences-container {
            display: grid;
            gap: 3rem;
        }

        .competence-category {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .competence-category.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .competence-category:nth-child(2) {
            transition-delay: 0.2s;
        }

        .competence-category:nth-child(3) {
            transition-delay: 0.4s;
        }

        .competence-category h3 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .competence-category h3::before {
            content: '';
            width: 8px;
            height: 40px;
            background: var(--yellow);
            border-radius: 4px;
        }

        .skills-grid {
            display: grid;
            gap: 1.5rem;
        }

        .skill-item {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .skill-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .skill-level {
            font-size: 0.9rem;
            color: var(--gray-medium);
            font-weight: 600;
        }

        .skill-bar {
            height: 12px;
            background: var(--gray);
            border-radius: 50px;
            overflow: hidden;
            position: relative;
        }

        .skill-fill {
            height: 100%;
            background: var(--yellow);
            border-radius: 50px;
            width: 0%;
            transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .skill-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .skill-item.animated .skill-fill[data-level="Avancé"] {
            width: 90%;
        }

        .skill-item.animated .skill-fill[data-level="Intermédiaire"] {
            width: 70%;
        }

        .skill-item.animated .skill-fill[data-level="Débutant"] {
            width: 40%;
        }

        /* Centres d'intérêt */
        .interests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .interest-card {
            background: var(--black);
            color: var(--white);
            padding: 2.5rem;
            border-radius: 16px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: scale(0.9);
        }

        .interest-card.visible {
            opacity: 1;
            transform: scale(1);
        }

        .interest-card:nth-child(2) {
            transition-delay: 0.1s;
        }

        .interest-card:nth-child(3) {
            transition-delay: 0.2s;
        }

        .interest-card:nth-child(4) {
            transition-delay: 0.3s;
        }

        .interest-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--yellow);
            transform: translateY(100%);
            transition: transform 0.4s ease;
            z-index: 0;
        }

        .interest-card:hover::before {
            transform: translateY(0);
        }

        .interest-card:hover {
            transform: translateY(-10px);
        }

        .interest-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .interest-card:hover .interest-icon {
            transform: scale(1.2) rotate(10deg);
        }

        .interest-text {
            font-size: 1.1rem;
            font-weight: 600;
            position: relative;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .interest-card:hover .interest-text {
            color: var(--black);
        }

        /* Contact */
        .contact-container {
            text-align: center;
            background: var(--black);
            color: var(--white);
            padding: 4rem;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
        }

        .contact-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--yellow) 0%, transparent 70%);
            opacity: 0.05;
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .contact-container h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }

        .contact-container p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--gray);
            position: relative;
            z-index: 1;
        }

        .contact-info {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 2rem;
            position: relative;
            z-index: 1;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-size: 1.1rem;
            color: var(--white);
        }

        .contact-item strong {
            color: var(--yellow);
        }

        /* Footer */
        footer {
            background: var(--black);
            color: var(--white);
            text-align: center;
            padding: 2rem;
            font-size: 0.95rem;
        }

        footer strong {
            color: var(--yellow);
        }

        /* Responsive */
        @media (max-width: 900px) {
            nav ul {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                background: var(--black);
                flex-direction: column;
                justify-content: center;
                transform: translateX(-100%);
                transition: transform 0.4s ease;
            }

            nav ul.active {
                transform: translateX(0);
            }

            nav a {
                color: var(--white);
                font-size: 1.5rem;
            }

            nav a.active {
                color: var(--yellow);
